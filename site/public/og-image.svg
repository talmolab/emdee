<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Icon (scaled from 512 viewBox to ~200px, centered vertically, left of center) -->
  <g transform="translate(300, 315) scale(0.39)">
    <rect x="-256" y="-256" width="512" height="512" rx="96" ry="96" fill="none"/>
    <!-- m -->
    <path d="M -176 96 L -176 -48
             C -176 -80 -152 -96 -124 -96
             C -96 -96 -80 -80 -80 -48
             L -80 96
             M -80 -48
             C -80 -80 -56 -96 -28 -96
             C 0 -96 16 -80 16 -48
             L 16 96"
          fill="none" stroke="#e6edf3" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- d -->
    <path d="M 176 -156 L 176 96
             M 176 0
             C 176 -52 140 -88 96 -88
             C 52 -88 16 -52 16 0
             C 16 52 52 88 96 88
             C 140 88 176 52 176 0 Z"
          fill="none" stroke="#58a6ff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="520" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="300" fill="#e6edf3">emdee</text>
  <text x="520" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#8b949e">A fast, minimal, cross-platform markdown viewer</text>

  <!-- Platform badges -->
  <text x="520" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#58a6ff">macOS  ·  Windows  ·  Linux</text>
</svg>
